<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BMW GIIAS 2026 — Check-In BC</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111;--white:#fff;--bg:#F5F4F0;
  --green-bg:#EAF3DE;--green-tx:#27500A;--green-bd:#C0DD97;
  --amber-bg:#FAEEDA;--amber-tx:#633806;--amber-bd:#FAC775;
  --red-bg:#FCEBEB;  --red-tx:#791F1F;  --red-bd:#F7C1C1;
  --radius:14px;--radius-sm:8px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--black);color:var(--white);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.bg-logo{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:.04;font-size:220px;font-weight:900;
  letter-spacing:-.02em;user-select:none;
}
.card{width:100%;max-width:400px;padding:0 20px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.logo-wrap{text-align:center;margin-bottom:28px}
.role-badge{
  display:inline-block;padding:5px 16px;border-radius:999px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:14px;
}
.logo-title{font-size:13px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:4px}
.logo-event{font-size:22px;font-weight:700;letter-spacing:.02em}

.form-wrap{width:100%}
.field-label{font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:rgba(255,255,255,.45);margin-bottom:10px}
.emp-input{
  width:100%;padding:16px 20px;font-size:24px;font-weight:700;text-align:center;
  letter-spacing:.15em;text-transform:uppercase;
  border:1.5px solid rgba(255,255,255,.15);border-radius:var(--radius);
  background:rgba(255,255,255,.06);color:var(--white);
  outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none;
}
.emp-input:focus{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.1)}
.emp-input::placeholder{font-weight:400;letter-spacing:.04em;color:rgba(255,255,255,.2);font-size:15px}
.hint{font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-top:10px}

.btn-checkin{
  width:100%;padding:17px;margin-top:16px;font-size:15px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  background:var(--white);color:var(--black);
  border:none;border-radius:var(--radius);cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn-checkin:hover:not(:disabled){opacity:.9}
.btn-checkin:active:not(:disabled){transform:scale(.98)}
.btn-checkin:disabled{opacity:.3;cursor:not-allowed}

.alert{display:none;width:100%;margin-top:14px;padding:12px 16px;
  border-radius:var(--radius-sm);font-size:13px;line-height:1.5;text-align:center}
.alert-error{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-bd)}
.alert-warn {background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd)}

.success-wrap{display:none;width:100%;flex-direction:column;align-items:center;text-align:center}
.suc-ring{width:80px;height:80px;border-radius:50%;background:var(--green-bg);
  border:2px solid var(--green-bd);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.suc-ring svg{width:38px;height:38px;color:var(--green-tx)}
.suc-name{font-size:24px;font-weight:700;margin-bottom:10px;line-height:1.3}

.suc-info-grid{width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.suc-info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;background:rgba(255,255,255,.05);border-radius:var(--radius-sm);
  font-size:13px;
}
.suc-info-label{color:rgba(255,255,255,.4);font-weight:500}
.suc-info-val{color:var(--white);font-weight:600;text-align:right}

.suc-status{display:inline-block;padding:8px 24px;border-radius:999px;
  font-size:13px;font-weight:700;margin-bottom:22px}
.st-ok  {background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd)}
.st-late{background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd)}

.btn-next{font-size:13px;padding:10px 24px;border-radius:var(--radius-sm);
  border:1px solid rgba(255,255,255,.2);background:transparent;
  color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s}
.btn-next:hover{border-color:rgba(255,255,255,.5);color:var(--white)}

.countdown-bar{width:100%;height:3px;background:rgba(255,255,255,.1);
  border-radius:999px;margin-top:16px;overflow:hidden;display:none}
.countdown-fill{height:100%;background:var(--white);border-radius:999px;width:100%;transition:width linear}

.footer{position:fixed;bottom:20px;left:0;right:0;text-align:center;
  font-size:11px;color:rgba(255,255,255,.2);letter-spacing:.06em}
</style>
</head>
<body>

<div class="bg-logo">BC</div>

<div class="card">
  <div class="logo-wrap">
    <div class="role-badge">Business Consultant</div>
    <div class="logo-title">Sales Attendance</div>
    <div class="logo-event">GIIAS 2026</div>
  </div>

  <div class="form-wrap" id="form-state">
    <div class="field-label">No ID</div>
    <input id="emp-input" class="emp-input" type="text" placeholder="BC001" maxlength="8"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
      oninput="this.value=this.value.toUpperCase();clearAlert()"
      onkeydown="if(event.key==='Enter')submitCheckin()" />
    <div class="hint">Masukkan No ID lalu tekan CHECK-IN</div>
    <div id="alert-error" class="alert alert-error"></div>
    <div id="alert-warn"  class="alert alert-warn"></div>
    <button id="btn-ci" class="btn-checkin" onclick="submitCheckin()">CHECK-IN</button>
  </div>

  <div class="success-wrap" id="success-state">
    <div class="suc-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="suc-name" id="suc-name">—</div>

    <div class="suc-info-grid">
      <div class="suc-info-row">
        <span class="suc-info-label">Dealer</span>
        <span class="suc-info-val" id="suc-dealer">—</span>
      </div>
      <div class="suc-info-row">
        <span class="suc-info-label">Outlet</span>
        <span class="suc-info-val" id="suc-outlet">—</span>
      </div>
      <div class="suc-info-row">
        <span class="suc-info-label">Tanggal</span>
        <span class="suc-info-val" id="suc-tanggal">—</span>
      </div>
      <div class="suc-info-row">
        <span class="suc-info-label">Waktu Check-In</span>
        <span class="suc-info-val" id="suc-jam">—</span>
      </div>
    </div>

    <div class="suc-status" id="suc-status">Tepat Waktu</div>
    <button class="btn-next" onclick="resetForm()">Check-in berikutnya →</button>
    <div class="countdown-bar" id="countdown-bar"><div class="countdown-fill" id="countdown-fill"></div></div>
  </div>
</div>

<div class="footer">BMW GROUP INDONESIA · GIIAS 2026</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwWaj5rHmRigvFgsBAop5sIlHODNZ06RqGkI4rHkIDJeeggb5XxYdXKs9s8Z6tqNHQ/exec";
const ROLE = "BC";
const AUTO_RESET_SECONDS = 6;
let resetTimer = null;

function clearAlert() {
  document.getElementById("alert-error").style.display = "none";
  document.getElementById("alert-warn").style.display  = "none";
}
function showAlert(type, msg) {
  clearAlert();
  const el = document.getElementById(type === "error" ? "alert-error" : "alert-warn");
  el.textContent = msg; el.style.display = "block";
}

async function api(params) {
  const qs  = new URLSearchParams(params).toString();
  const res = await fetch(GAS_URL + "?" + qs, { method: "GET", redirect: "follow" });
  const txt = await res.text();
  if (!txt || txt.trim().startsWith("<"))
    throw new Error("Server tidak merespons dengan benar.");
  return JSON.parse(txt);
}

async function submitCheckin() {
  const input = document.getElementById("emp-input");
  const noId  = input.value.trim().toUpperCase();
  const btn   = document.getElementById("btn-ci");
  clearAlert();

  if (!noId) { showAlert("error", "Masukkan No ID terlebih dahulu."); input.focus(); return; }

  btn.disabled = true;
  btn.textContent = "Memproses…";

  try {
    const res = await api({ action: "checkin", noId, role: ROLE });
    if (res.success && res.data) {
      showSuccess(res.data);
    } else if (res.code === "DUPLICATE") {
      showAlert("warn", res.message);
      btn.disabled = false; btn.textContent = "CHECK-IN";
    } else {
      showAlert("error", res.message || "Terjadi kesalahan. Coba lagi.");
      btn.disabled = false; btn.textContent = "CHECK-IN";
    }
  } catch(e) {
    showAlert("error", "Gagal terhubung ke server: " + e.message);
    btn.disabled = false; btn.textContent = "CHECK-IN";
  }
}

function showSuccess(d) {
  document.getElementById("suc-name").textContent    = "Welcome, " + d.nama;
  document.getElementById("suc-dealer").textContent  = d.dealer;
  document.getElementById("suc-outlet").textContent  = d.outlet;
  document.getElementById("suc-tanggal").textContent = d.tanggal;
  document.getElementById("suc-jam").textContent     = d.jam + " WIB";

  const statusEl = document.getElementById("suc-status");
  if (d.status === "Terlambat") {
    statusEl.textContent = "⚠  Terlambat";
    statusEl.className   = "suc-status st-late";
  } else {
    statusEl.textContent = "✓  Tepat Waktu";
    statusEl.className   = "suc-status st-ok";
  }

  document.getElementById("form-state").style.display    = "none";
  document.getElementById("success-state").style.display = "flex";

  const bar = document.getElementById("countdown-bar");
  const fill = document.getElementById("countdown-fill");
  bar.style.display = "block";
  fill.style.width = "100%"; fill.style.transition = "none";
  fill.getBoundingClientRect();
  fill.style.transition = "width " + AUTO_RESET_SECONDS + "s linear";
  fill.style.width = "0%";

  clearTimeout(resetTimer);
  resetTimer = setTimeout(() => resetForm(), AUTO_RESET_SECONDS * 1000);
}

function resetForm() {
  clearTimeout(resetTimer);
  document.getElementById("emp-input").value = "";
  document.getElementById("btn-ci").disabled = false;
  document.getElementById("btn-ci").textContent = "CHECK-IN";
  document.getElementById("countdown-bar").style.display = "none";
  clearAlert();
  document.getElementById("form-state").style.display    = "block";
  document.getElementById("success-state").style.display = "none";
  setTimeout(() => document.getElementById("emp-input").focus(), 100);
}

window.addEventListener("load", () => {
  setTimeout(() => document.getElementById("emp-input").focus(), 300);
});
</script>
</body>
</html>
